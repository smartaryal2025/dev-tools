<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diff Checker - Pro Developer Tools</title>
<link rel="icon" type="image/png" href="libs/dev-512.png">
<link rel="stylesheet" href="libs/style.css">
<style>
    .modern-split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch; }
    .grid-col { display: flex; flex-direction: column; gap: 10px; height: 100%; }
    
    /* Specific styles for Diff Highlighting (Restored from your original file) */
    .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .diff-pane { background: var(--bg-start); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 15px; overflow-y: auto; height: 500px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-wrap: break-word; }
    .diff-line { padding: 2px 5px; border-radius: 3px; display: block; min-height: 18px; }
    .diff-added { background-color: rgba(34, 197, 94, 0.15); color: var(--color-success); border-left: 3px solid var(--color-success); }
    .diff-removed { background-color: rgba(239, 68, 68, 0.15); color: var(--color-error); text-decoration: line-through; border-left: 3px solid var(--color-error); }
    .diff-unchanged { color: var(--text-secondary); }
    .diff-line-number { display: inline-block; width: 35px; color: var(--text-secondary); text-align: right; margin-right: 15px; user-select: none; }
    .spacer-line { background: transparent; color: transparent; user-select: none; }
    
    @media screen and (max-width: 768px) {
        .modern-split-grid { display: flex; flex-direction: column; }
        .diff-container { display: flex; flex-direction: column; gap: 10px; }
        .diff-pane { height: 350px; }
    }
</style>
</head>
<body>

<div class="container" style="max-width: 1600px;"> 
    <div class="app-header" style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 25px;">
        <span style="font-size: 24px; font-weight: bold; color: var(--text-primary);">⚖️ Diff Editor</span>
        <div class="header-actions">
            <div class="dropdown-wrapper">
                <button class="header-btn" style="border-color: var(--accent-primary); color: var(--accent-primary); cursor: default;">🧭 Menu ▾</button>
                <div class="dropdown-menu">
                    <a href="index.html" class="dropdown-link">🏠 Main Suite</a>
                    <a href="workspace.html" class="dropdown-link">💻 Code Workspace</a>
                    <a href="scraper.html" class="dropdown-link">🕸️ Data Scraper</a>
                    <a href="notes.html" class="dropdown-link">📝 Dev Notes</a>
                </div>
            </div>
            <button id="theme-toggle-btn" class="header-btn">🌙 Mode</button>
        </div>
    </div>

    <div class="modern-split-grid">
        <div class="grid-col">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <h3 class="text-danger" style="margin: 0;">Original Code (-)</h3>
            </div>
            <div class="drop-zone drop-zone-wrapper" onclick="document.getElementById('diff-file-original').click()">📁 Drop Original File</div>
            <input type="file" id="diff-file-original" style="display: none;">
            <textarea id="diff-original" class="code-area" style="flex-grow: 1; height: 300px;" placeholder="Paste or load the old version of your code here..."></textarea>
        </div>
        
        <div class="grid-col">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <h3 class="text-success" style="margin: 0;">Modified Code (+)</h3>
            </div>
            <div class="drop-zone drop-zone-wrapper" onclick="document.getElementById('diff-file-modified').click()">📁 Drop Modified File</div>
            <input type="file" id="diff-file-modified" style="display: none;">
            <textarea id="diff-modified" class="code-area" style="flex-grow: 1; height: 300px;" placeholder="Paste or load the new version of your code here..."></textarea>
        </div>
    </div>

    <div class="action-row" style="justify-content: center; margin: 25px 0;">
        <button id="btn-compare" style="background: var(--accent-primary); color: var(--surface-dark); flex: 0 1 250px;">⚖️ Compare Codes</button>
        <button id="btn-clear" class="btn-clear" style="flex: 0 1 150px;">🗑️ Clear All</button>
    </div>

    <div id="diff-result-wrapper" style="display: none;">
        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 10px;">Visual Difference</h3>
        <div class="diff-container" id="diff-result">
            <div class="diff-pane" id="diff-out-left"></div>
            <div class="diff-pane" id="diff-out-right"></div>
        </div>
    </div>

</div>

<script>
    // Theme Toggle Logic
    const themeBtn = document.getElementById('theme-toggle-btn');
    const htmlTag = document.documentElement;
    const savedTheme = localStorage.getItem('app_theme');
    if (savedTheme === 'light') { htmlTag.setAttribute('data-theme', 'light'); if (themeBtn) themeBtn.textContent = '☀️ Mode'; }
    if (themeBtn) {
        themeBtn.onclick = () => {
            if (htmlTag.getAttribute('data-theme') === 'light') { htmlTag.removeAttribute('data-theme'); localStorage.setItem('app_theme', 'dark'); themeBtn.textContent = '🌙 Mode'; } 
            else { htmlTag.setAttribute('data-theme', 'light'); localStorage.setItem('app_theme', 'light'); themeBtn.textContent = '☀️ Mode'; }
        };
    }
</script>

<script src="libs/editor.js"></script>
</body>
</html>
