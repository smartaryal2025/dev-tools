<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diff Checker - Pro Developer Tools</title>
<link rel="stylesheet" href="libs/style.css">
<style>
    /* Specific styles for Diff Highlighting */
    .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .diff-pane { background: var(--bg-start); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 15px; overflow-y: auto; height: 500px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-wrap: break-word; } /* ← FIXED */
    
    .diff-line { padding: 2px 5px; border-radius: 3px; display: block; min-height: 18px; }
    .diff-added { background-color: rgba(34, 197, 94, 0.15); color: var(--color-success); border-left: 3px solid var(--color-success); }
    .diff-removed { background-color: rgba(239, 68, 68, 0.15); color: var(--color-error); text-decoration: line-through; border-left: 3px solid var(--color-error); }
    .diff-unchanged { color: var(--text-secondary); }
    
    .diff-line-number { display: inline-block; width: 35px; color: var(--text-secondary); text-align: right; margin-right: 15px; user-select: none; } /* ← FIXED */
    .spacer-line { background: transparent; color: transparent; user-select: none; }
</style>
</head>
<body>

<div class="container" style="max-width: 1600px;"> 
    <div class="app-header" style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; gap: 15px;">
        
        <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
            <a href="index.html" class="header-btn" style="text-decoration: none;">⬅ Back to Main Suite</a>
            <span style="font-size: 24px; font-weight: bold; color: var(--text-primary);">⚖️ Advanced Diff Editor</span>
        </div>
        
        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
            <a href="workspace.html" class="header-btn" style="text-decoration: none;">💻 Code Workspace</a>
            <a href="editor.html" class="header-btn" style="text-decoration: none;">⚖️ Diff Editor</a>
            <a href="scraper.html" class="header-btn" style="text-decoration: none;">🕸️ Data Scraper</a>
	    <button id="theme-toggle-btn" class="header-btn" style="border-radius: 50%; padding: 0 10px; font-size: 16px;" title="Toggle Theme">🌙</button>
        </div>
        
    </div>

    <div class="grid-layout">
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 class="text-danger" style="margin: 0;">Original Code (-)</h3>
                <input type="file" id="diff-file-original" style="display: none;">
                <button onclick="document.getElementById('diff-file-original').click()" style="background: var(--surface-light); color: var(--text-primary); border: 1px solid var(--border-color); padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor:pointer;">📂 Load File</button>
            </div>
            <textarea id="diff-original" class="code-area" style="height: 300px;" placeholder="Paste or load the old version of your code here..."></textarea>
        </div>
        
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 class="text-success" style="margin: 0;">Modified Code (+)</h3>
                <input type="file" id="diff-file-modified" style="display: none;">
                <button onclick="document.getElementById('diff-file-modified').click()" style="background: var(--surface-light); color: var(--text-primary); border: 1px solid var(--border-color); padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor:pointer;">📂 Load File</button>
            </div>
            <textarea id="diff-modified" class="code-area" style="height: 300px;" placeholder="Paste or load the new version of your code here..."></textarea>
        </div>
    </div>

    <div class="action-row" style="justify-content: center; margin: 25px 0;">
        <button id="btn-compare" style="background: var(--accent-primary); color: var(--surface-dark); flex: 0 1 250px;">⚖️ Compare Codes</button>
        <button id="btn-clear" class="btn-clear" style="flex: 0 1 150px;">🗑️ Clear All</button>
    </div>

    <div id="diff-result-wrapper" style="display: none;">
        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 10px;">Visual Difference</h3>
        <div class="diff-container" id="diff-result">
            <div class="diff-pane" id="diff-out-left"></div>
            <div class="diff-pane" id="diff-out-right"></div>
        </div>
    </div>

</div>

<script>
    // Theme Toggle Logic
    const themeBtn = document.getElementById('theme-toggle-btn');
    const htmlTag = document.documentElement;
    
    const savedTheme = localStorage.getItem('app_theme');
    if (savedTheme === 'light') {
        htmlTag.setAttribute('data-theme', 'light');
        if (themeBtn) themeBtn.textContent = '☀️';
    }

    if (themeBtn) {
        themeBtn.onclick = () => {
            const currentTheme = htmlTag.getAttribute('data-theme');
            if (currentTheme === 'light') {
                htmlTag.removeAttribute('data-theme');
                localStorage.setItem('app_theme', 'dark');
                themeBtn.textContent = '🌙';
            } else {
                htmlTag.setAttribute('data-theme', 'light');
                localStorage.setItem('app_theme', 'light');
                themeBtn.textContent = '☀️';
            }
        };
    }
</script>

<script src="libs/editor.js"></script>
</body>
</html>
