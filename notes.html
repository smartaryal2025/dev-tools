<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Notes - Pro Developer Tools</title>
<link rel="icon" type="image/png" href="libs/dev-512.png">
<link rel="stylesheet" href="libs/style.css">
<style>
    html, body { margin: 0; background: var(--bg-end); height: 100vh; overflow: hidden; }
    .workspace-container { display: flex; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; width: 100%; }
    .editor-toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; background: var(--surface-dark); padding: 10px 15px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
    .modern-split-grid { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; min-height: 0; }
    .code-area, .preview-area { height: 100%; margin: 0; padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--surface-dark); overflow-y: auto; }
    .preview-area { background: var(--surface-light); color: var(--text-primary); }
    .preview-area h1, .preview-area h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    .preview-area code { background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; font-family: monospace; color: var(--color-warning); }
    .preview-area pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; color: #fff; }
    @media screen and (max-width: 768px) {
        html, body { overflow: auto; height: auto; }
        .workspace-container { height: auto; }
        .modern-split-grid { display: flex; flex-direction: column; }
        .code-area, .preview-area { min-height: 400px; }
    }
</style>
</head>
<body>
<div class="workspace-container">
    
    <div class="app-header" style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px;">
        <span style="font-size: 24px; font-weight: bold; color: var(--text-primary);">📝 Dev Notes (Markdown)</span>
        <div class="header-actions">
            <a href="notes-guide.html" class="header-btn" style="text-decoration: none; border-color: var(--color-teal); color: var(--color-teal);">❓ Guide</a>
            <div class="dropdown-wrapper">
                <button class="header-btn" style="border-color: var(--accent-primary); color: var(--accent-primary); cursor: default;">🧭 Menu ▾</button>
                <div class="dropdown-menu">
                    <a href="index.html" class="dropdown-link">🏠 Main Suite</a>
                    <a href="workspace.html" class="dropdown-link">💻 Code Workspace</a>
                    <a href="editor.html" class="dropdown-link">⚖️ Diff Editor</a>
                    <a href="scraper.html" class="dropdown-link">🕸️ Data Scraper</a>
                </div>
            </div>
            <button id="theme-toggle-btn" class="header-btn">🌙 Mode</button>
        </div>
    </div>

    <div class="editor-toolbar">
        <input type="file" id="file-input-md" style="display: none;" accept=".md,.txt">
        <button id="btn-open-md" style="border-color: var(--border-color);">📂 Open .MD</button>
        <button id="btn-save" style="color: var(--color-success); border-color: rgba(35, 134, 54, 0.4);">💾 Download .MD</button>
        <button id="btn-copy-html" style="color: var(--accent-primary); border-color: rgba(47, 129, 247, 0.4);">📋 Copy HTML</button>
        <button id="btn-clear" class="btn-clear">🗑️ Clear</button>
        <span style="margin-left: auto; font-size: 13px; color: var(--color-warning);">Live Auto-Save Enabled</span>
    </div>

    <div class="modern-split-grid">
        <textarea id="notes-input" class="code-area" placeholder="# Enter Markdown Here..."></textarea>
        <div id="notes-preview" class="preview-area"><h1>Preview Output</h1></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const input = document.getElementById('notes-input');
    const preview = document.getElementById('notes-preview');
    
    // 🚀 AUTO-SAVE: Load saved notes on boot
    const savedNotes = localStorage.getItem('dev_notes_offline');
    if (savedNotes) {
        input.value = savedNotes;
        preview.innerHTML = marked.parse(savedNotes);
    }

    // 🚀 AUTO-SAVE: Save on every keystroke
    input.addEventListener('input', () => { 
        preview.innerHTML = marked.parse(input.value); 
        localStorage.setItem('dev_notes_offline', input.value);
    });
    
    // 🚀 NEW: File Loader Logic
    const fileInputMd = document.getElementById('file-input-md');
    const btnOpenMd = document.getElementById('btn-open-md');

    btnOpenMd.onclick = () => fileInputMd.click();
    fileInputMd.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            input.value = evt.target.result;
            preview.innerHTML = marked.parse(input.value);
            localStorage.setItem('dev_notes_offline', input.value); // Force auto-save on load
        };
        reader.readAsText(file);
        this.value = ''; // Reset input so you can load the same file again if needed
    });

    document.getElementById('btn-clear').onclick = () => { 
        if(confirm("Clear all notes permanently?")) {
            input.value = ''; preview.innerHTML = ''; 
            localStorage.removeItem('dev_notes_offline');
        }
    };

    document.getElementById('btn-save').onclick = () => {
        const blob = new Blob([input.value], { type: 'text/markdown' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `note.md`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    };

    document.getElementById('btn-copy-html').onclick = (e) => {
        if (!preview.innerHTML || input.value.trim() === '') return;
        navigator.clipboard.writeText(preview.innerHTML).then(() => {
            const orig = e.target.innerHTML;
            e.target.innerHTML = "✔ Copied!";
            setTimeout(() => { e.target.innerHTML = orig; }, 1500);
        });
    };

    // Theme Logic
    const themeBtn = document.getElementById('theme-toggle-btn');
    const htmlTag = document.documentElement;
    const savedTheme = localStorage.getItem('app_theme');
    if (savedTheme === 'light') { htmlTag.setAttribute('data-theme', 'light'); if (themeBtn) themeBtn.textContent = '☀️ Mode'; }
    if (themeBtn) {
        themeBtn.onclick = () => {
            if (htmlTag.getAttribute('data-theme') === 'light') { htmlTag.removeAttribute('data-theme'); localStorage.setItem('app_theme', 'dark'); themeBtn.textContent = '🌙 Mode'; } 
            else { htmlTag.setAttribute('data-theme', 'light'); localStorage.setItem('app_theme', 'light'); themeBtn.textContent = '☀️ Mode'; }
        };
    }
</script>
</body>
</html>
